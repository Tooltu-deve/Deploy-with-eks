# Cài ArgoCD trước, rồi sửa repoURL bên dưới cho đúng repo GitHub của bạn.
# Chỉ sync deployment + service (không sync cluster.yaml — file đó dành cho eksctl).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Tooltu-deve/Deploy-with-eks.git
    targetRevision: main
    path: k8s
    directory:
      include: "{deployment.yaml,service.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
